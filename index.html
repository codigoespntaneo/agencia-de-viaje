<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CosmoFamily</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="src/css/style.css">
</head>
<body>
    <!-- Navigation -->
    <nav class="fixed top-0 w-full z-50 bg-white/80 backdrop-blur-md border-b border-purple-100 px-8 py-4 flex justify-between items-center">
        <div class="flex items-center gap-2">
            <svg class="w-8 h-8 text-purple-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 11l-7-7-7 7m14 0v8a2 2 0 01-2 2H5a2 2 0 01-2-2v-8m14 0L12 4L5 11" />
            </svg>
            <span class="text-2xl font-extrabold text-purple-700 tracking-tight">CosmoFamily</span>
        </div>
        <div class="hidden md:flex gap-8 font-medium text-gray-600">
            <a href="#" class="hover:text-purple-600 transition-colors">Destinos</a>
            <a href="#" class="hover:text-purple-600 transition-colors">Nosotros</a>
            <a href="#" class="hover:text-purple-600 transition-colors">Registro</a>
        </div>
        <button class="bg-purple-600 text-white px-6 py-2 rounded-full font-bold hover:bg-purple-700 transition-all">Reservar Ahora</button>
    </nav>

    <!-- Hero Section -->
    <section class="pt-32 pb-20 px-8 max-w-7xl mx-auto grid md:grid-cols-2 gap-12 items-center">
        <div>
            <span class="inline-block px-4 py-1 bg-purple-100 text-purple-700 rounded-full text-sm font-bold mb-6">Misión 2024: Exploración Familiar</span>
            <h1 class="text-6xl font-extrabold leading-tight mb-6">Tu Próximo Gran Salto <span class="text-purple-600 italic">es en Familia</span></h1>
            <p class="text-xl text-gray-600 mb-8 leading-relaxed">Experimenta el turismo espacial diseñado para todas las edades. Seguridad galáctica, confort estelar y recuerdos que durarán toda una vida luz.</p>
            <div class="flex gap-4">
                <button class="btn-primary px-8 py-4 rounded-xl font-bold text-lg">Ver Destinos</button>
                <button class="btn-outline px-8 py-4 rounded-xl font-bold text-lg">Saber más</button>
            </div>
        </div>
        <div class="relative">
            <img src="/src/img/astronautas.jpg" alt="Familia en el espacio" class="rounded-3xl shadow-2xl w-full object-cover aspect-square">
            <div class="absolute -bottom-6 -left-6 bg-white p-6 rounded-2xl shadow-xl glass-card">
                <p class="text-purple-600 font-bold text-xl">+2,500</p>
                <p class="text-gray-500 text-sm">Familias listas</p>
            </div>
        </div>
    </section>


</body>
</html>
